<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Feature Graphic Preview - 1024x500</title>
  <style>
    body { margin: 0; background: #222; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; font-family: system-ui; color: #eee; padding: 20px; }
    .stage { width: 1024px; height: 500px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
    .info { margin-bottom: 16px; text-align: center; }
    button { margin-top: 16px; padding: 10px 20px; background: #EAB308; color: #000; border: none; border-radius: 8px; font-weight: 800; cursor: pointer; font-size: 14px; }
  </style>
</head>
<body>
  <div class="info">
    <strong>Play Store Feature Graphic</strong> · 1024 × 500 px
    <div style="font-size:13px;color:#9CA3AF;margin-top:4px;">Clic droit sur l'image → « Enregistrer sous » ou utilisez le bouton PNG ci-dessous</div>
  </div>
  <object class="stage" data="feature-graphic.svg" type="image/svg+xml"></object>
  <button onclick="exportPng()">Exporter en PNG</button>

  <script>
    async function exportPng() {
      const res = await fetch('feature-graphic.svg')
      const svgText = await res.text()
      const svg = new Blob([svgText], { type: 'image/svg+xml;charset=utf-8' })
      const url = URL.createObjectURL(svg)
      const img = new Image()
      img.onload = () => {
        const canvas = document.createElement('canvas')
        canvas.width = 1024
        canvas.height = 500
        const ctx = canvas.getContext('2d')
        ctx.drawImage(img, 0, 0, 1024, 500)
        canvas.toBlob((blob) => {
          const a = document.createElement('a')
          a.href = URL.createObjectURL(blob)
          a.download = 'binomepay-feature-graphic-1024x500.png'
          a.click()
        }, 'image/png', 1.0)
        URL.revokeObjectURL(url)
      }
      img.src = url
    }
  </script>
</body>
</html>
