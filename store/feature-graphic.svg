<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="500" viewBox="0 0 1024 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0F1A"/>
      <stop offset="60%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#EAB308"/>
      <stop offset="100%" stop-color="#FDE68A"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#EAB308" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#EAB308" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1024" height="500" fill="url(#bg)"/>

  <!-- glow blobs -->
  <circle cx="820" cy="120" r="220" fill="url(#glow)"/>
  <circle cx="150" cy="420" r="180" fill="url(#glow)"/>

  <!-- subtle grid -->
  <g opacity="0.05" stroke="#E5E7EB" stroke-width="1">
    <line x1="0" y1="125" x2="1024" y2="125"/>
    <line x1="0" y1="250" x2="1024" y2="250"/>
    <line x1="0" y1="375" x2="1024" y2="375"/>
    <line x1="256" y1="0" x2="256" y2="500"/>
    <line x1="512" y1="0" x2="512" y2="500"/>
    <line x1="768" y1="0" x2="768" y2="500"/>
  </g>

  <!-- Left: text block -->
  <g transform="translate(60, 130)">
    <!-- Brand tag -->
    <rect x="0" y="0" width="160" height="36" rx="18" fill="#EAB308" opacity="0.18"/>
    <text x="80" y="24" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="15" font-weight="700" fill="#FDE68A" text-anchor="middle" letter-spacing="1.5">BINOMEPAY</text>

    <!-- Main title -->
    <text x="0" y="100" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="52" font-weight="900" fill="#FFFFFF">Change de devises</text>
    <text x="0" y="160" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="52" font-weight="900" fill="url(#gold)">entre particuliers</text>

    <!-- Subtitle -->
    <text x="0" y="210" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="20" font-weight="500" fill="#9CA3AF">Zéro frais bancaire · Sécurisé · Local</text>
  </g>

  <!-- Right: phone + swap visual -->
  <g transform="translate(640, 60)">
    <!-- phone frame -->
    <rect x="40" y="0" width="240" height="420" rx="32" fill="#0B1220" stroke="#334155" stroke-width="2"/>
    <rect x="52" y="12" width="216" height="396" rx="22" fill="#111827"/>

    <!-- notch -->
    <rect x="130" y="18" width="60" height="8" rx="4" fill="#0B0F1A"/>

    <!-- app header -->
    <text x="160" y="60" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#FDE68A" text-anchor="middle">BINOMEPAY</text>

    <!-- card 1 -->
    <rect x="72" y="80" width="176" height="80" rx="14" fill="#1F2937" stroke="#334155" stroke-width="1"/>
    <circle cx="94" cy="102" r="10" fill="#EAB308" opacity="0.25"/>
    <text x="94" y="107" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" font-weight="700" fill="#EAB308" text-anchor="middle">€</text>
    <text x="115" y="106" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#E5E7EB">ENVOYER</text>
    <text x="115" y="125" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">500 €</text>
    <text x="115" y="145" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="10" font-weight="500" fill="#9CA3AF">Paris → Dakar</text>

    <!-- swap icon -->
    <circle cx="160" cy="175" r="14" fill="#EAB308"/>
    <text x="160" y="181" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="16" font-weight="900" fill="#000000" text-anchor="middle">⇅</text>

    <!-- card 2 -->
    <rect x="72" y="195" width="176" height="80" rx="14" fill="#1F2937" stroke="#334155" stroke-width="1"/>
    <circle cx="94" cy="217" r="10" fill="#60A5FA" opacity="0.25"/>
    <text x="94" y="222" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#60A5FA" text-anchor="middle">F</text>
    <text x="115" y="221" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="#E5E7EB">RECEVOIR</text>
    <text x="115" y="240" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="16" font-weight="800" fill="#FFFFFF">328 000 XOF</text>
    <text x="115" y="260" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="10" font-weight="500" fill="#9CA3AF">Match trouvé</text>

    <!-- match badge -->
    <rect x="72" y="295" width="176" height="44" rx="10" fill="#EAB308"/>
    <text x="160" y="322" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="800" fill="#000000" text-anchor="middle">✓ Binôme compatible</text>

    <!-- bottom hint -->
    <text x="160" y="375" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="10" font-weight="500" fill="#6B7280" text-anchor="middle">Échangez en toute sécurité</text>
  </g>

  <!-- Accent stripe bottom-left -->
  <rect x="60" y="400" width="40" height="4" fill="url(#gold)"/>
</svg>
